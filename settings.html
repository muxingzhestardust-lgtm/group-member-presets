<div id="group_ppm_settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Group Per-Member Presets</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <label class="checkbox_label" for="group_ppm_enabled" title="When enabled, the preset chosen next to each group member is applied before that member replies, instead of the global AI Response Configuration preset.">
                <input id="group_ppm_enabled" type="checkbox" />
                <span>Use per-member presets in group chats</span>
            </label>
            <small class="notes">
                Open a group chat, then use the preset dropdown next to each member in the
                group control panel. Members left on "(global)" keep the currently selected
                preset. The global preset is automatically restored after generation finishes.
                Presets are stored per API.
            </small>
        </div>
    </div>
</div>
